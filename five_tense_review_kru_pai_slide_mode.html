<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>5 Tense Focus Slides | Kru Pai Classroom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&family=Nunito:wght@800;900&display=swap');
:root{
  --ink:#16204c;--muted:#60708f;--white:#fff;--soft:#f6fbff;--shadow:0 22px 50px rgba(25,45,105,.18);
  --blue:#2f8fff;--purple:#8c61ff;--pink:#ff5aa5;--green:#22bf86;--orange:#ff9b23;--dark:#111a45;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:'Prompt',sans-serif;color:var(--ink);overflow-x:hidden}
body{background:radial-gradient(circle at 10% 0%,#dcf5ff 0,#f8fbff 34%,#fff2f9 100%)}
.bgDecor{position:fixed;inset:0;pointer-events:none;z-index:-2;background-image:radial-gradient(rgba(255,255,255,.9) 1.5px,transparent 2px),radial-gradient(rgba(47,143,255,.2) 2px,transparent 3px);background-size:36px 36px,78px 78px;animation:float 18s linear infinite}.blob{position:fixed;border-radius:50%;filter:blur(14px);opacity:.25;z-index:-1}.b1{width:260px;height:260px;background:#5dd6ff;left:-70px;top:80px}.b2{width:330px;height:330px;background:#ff7fbd;right:-120px;top:20px}.b3{width:220px;height:220px;background:#ffd36b;right:8%;bottom:-80px}@keyframes float{to{background-position:180px 120px,-140px 180px}}
button,a{font-family:inherit}.app{min-height:100vh;display:flex;flex-direction:column}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:rgba(255,255,255,.74);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.9)}.brand{display:flex;align-items:center;gap:8px;background:var(--dark);color:white;border-radius:999px;padding:9px 14px;font-weight:900;white-space:nowrap}.progressWrap{flex:1;max-width:500px;height:14px;background:#e7ecff;border-radius:999px;overflow:hidden;box-shadow:inset 0 0 0 2px rgba(255,255,255,.55)}.progress{height:100%;width:0%;background:linear-gradient(90deg,#2f8fff,#8c61ff,#ff5aa5,#ff9b23);border-radius:999px;transition:.35s}.pageCount{font-weight:900;background:white;border-radius:999px;padding:8px 12px;box-shadow:0 8px 18px rgba(30,50,110,.12);white-space:nowrap}
.stageTabs{display:flex;gap:8px;overflow:auto;padding:10px 14px;background:rgba(255,255,255,.55)}.tab{border:0;border-radius:999px;padding:9px 13px;background:white;color:#27305d;font-weight:900;box-shadow:0 8px 16px rgba(30,50,110,.11);white-space:nowrap;cursor:pointer}.tab.active{color:white;background:linear-gradient(135deg,#2f8fff,#8c61ff);transform:translateY(-1px)}
.slideArea{flex:1;display:grid;place-items:center;padding:16px}.slide{width:min(1100px,100%);min-height:calc(100vh - 168px);display:none;animation:pop .35s ease}.slide.active{display:grid}.panel{width:100%;min-height:calc(100vh - 168px);background:rgba(255,255,255,.94);border:3px solid rgba(255,255,255,.96);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:.95fr 1.05fr;position:relative}.panel.full{grid-template-columns:1fr}.heroPane{color:white;padding:30px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.heroPane:before{content:"";position:absolute;inset:auto -90px -80px auto;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.18)}.heroPane .emoji{position:absolute;right:20px;bottom:8px;font-size:125px;opacity:.22}.kicker{display:inline-flex;align-items:center;gap:8px;width:max-content;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 13px;font-weight:900}.heroPane h1{font-family:'Nunito',sans-serif;font-size:clamp(46px,7vw,82px);line-height:.88;margin:20px 0 8px}.use{font-size:clamp(21px,3vw,34px);font-weight:900;line-height:1.25}.signal{display:flex;flex-wrap:wrap;gap:8px}.pill{background:rgba(255,255,255,.24);border:1px solid rgba(255,255,255,.42);border-radius:999px;padding:8px 12px;font-weight:900}.contentPane{padding:30px;display:flex;flex-direction:column;gap:16px;justify-content:center}.bigTitle{font-size:clamp(30px,4vw,50px);margin:0;font-weight:900}.lead{font-size:clamp(19px,2.4vw,26px);color:#46557d;font-weight:700;line-height:1.45}.formulaCard{background:linear-gradient(180deg,#f8fbff,#fff);border:2px solid #e9eeff;border-radius:26px;padding:20px;box-shadow:0 12px 24px rgba(40,60,120,.1)}.formulaCard h2,.exampleCard h2{margin:0 0 10px;font-size:28px}.formula{font-family:'Nunito',sans-serif;font-size:clamp(26px,3.4vw,42px);font-weight:900;background:white;border-radius:20px;padding:16px;border:2px solid #eef2ff;color:#172154;box-shadow:inset 0 0 0 2px rgba(20,35,85,.03);margin:8px 0}.note{font-size:18px;color:#687590;font-weight:700}.exampleGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.exampleCard{background:#fff;border-radius:26px;padding:18px;border:2px solid #edf1ff;box-shadow:0 12px 24px rgba(40,60,120,.11);position:relative;overflow:hidden}.exampleCard:before{content:"";position:absolute;left:0;top:0;right:0;height:8px;background:var(--accent,#2f8fff)}.label{display:inline-flex;align-items:center;gap:6px;font-weight:900;border-radius:999px;padding:7px 11px;background:#f2f5ff;color:#1f2a64}.en{font-size:clamp(22px,2.7vw,34px);font-weight:900;line-height:1.25;margin:13px 0 5px}.th{font-size:17px;color:#687590;font-weight:700}.focusWord{display:inline-block;background:#fff2a8;border-radius:10px;padding:0 6px;color:#111a45}.ruleList{display:grid;gap:12px}.rule{display:flex;align-items:flex-start;gap:10px;background:#f7f9ff;border-radius:20px;padding:14px;font-size:20px;font-weight:800;border:1px solid #e9eeff}.rule span:first-child{font-size:28px}.summaryGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}.sumCard{background:white;border-radius:24px;padding:16px;text-align:center;border:2px solid #edf1ff;box-shadow:0 10px 20px rgba(40,60,120,.11);font-weight:900}.sumCard .ic{font-size:42px;display:block}.sumCard b{display:block;font-size:17px;margin:6px 0}.sumCard small{color:#687590;font-size:14px}.compareGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.compareCard{background:#fff;border-radius:24px;padding:16px;border:2px solid #edf1ff;border-top:9px solid var(--accent);box-shadow:0 10px 20px rgba(40,60,120,.1)}.compareCard b{display:block;margin-bottom:8px}.compareCard .en{font-size:20px}.slideBtns{position:sticky;bottom:0;z-index:25;display:flex;align-items:center;justify-content:center;gap:14px;padding:12px;background:rgba(255,255,255,.78);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.9)}.navBtn{border:0;border-radius:20px;padding:14px 22px;font-weight:900;font-size:18px;cursor:pointer;background:white;color:#18225a;box-shadow:0 12px 24px rgba(30,50,110,.15)}.navBtn.next{color:white;background:linear-gradient(135deg,#2f8fff,#8c61ff)}.navBtn:disabled{opacity:.42;cursor:not-allowed}.centerTip{font-weight:900;color:#4f5d82}.blue{background:linear-gradient(135deg,#22b4ff,#336dff)}.purple{background:linear-gradient(135deg,#795dff,#b05cff)}.pink{background:linear-gradient(135deg,#ff5aa5,#ff87cf)}.green{background:linear-gradient(135deg,#14b87b,#57deb0)}.orange{background:linear-gradient(135deg,#ff8f1f,#ffc04c)}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@media(max-width:900px){.topbar{padding:8px}.brand{font-size:13px;padding:8px 10px}.pageCount{font-size:13px}.stageTabs{padding:8px}.slideArea{padding:10px}.slide,.panel{min-height:calc(100vh - 155px)}.panel{grid-template-columns:1fr;border-radius:24px}.heroPane{min-height:260px;padding:22px}.contentPane{padding:20px}.exampleGrid,.summaryGrid,.compareGrid{grid-template-columns:1fr}.formula{font-size:26px}.navBtn{padding:12px 16px;font-size:16px}.centerTip{display:none}.heroPane .emoji{font-size:96px}.rule{font-size:17px}.lead{font-size:18px}}
@media(max-width:520px){.progressWrap{display:none}.topbar{gap:6px}.brand{max-width:150px;overflow:hidden}.slideBtns{gap:8px}.navBtn{border-radius:16px;padding:11px 13px}.tab{font-size:13px}.bigTitle{font-size:28px}.heroPane h1{font-size:44px}.use{font-size:21px}}
</style>
</head>
<body>
<div class="bgDecor"></div><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="app">
  <div class="topbar"><div class="brand">🌟 Kru Pai Classroom</div><div class="progressWrap"><div class="progress" id="progress"></div></div><div class="pageCount" id="pageCount">1 / 22</div></div>
  <div class="stageTabs" id="tabs"></div>
  <main class="slideArea" id="slideArea"></main>
  <div class="slideBtns"><button class="navBtn" id="prevBtn">⬅️ ก่อนหน้า</button><div class="centerTip">อ่านทีละหน้า โฟกัสทีละ Tense ✨</div><button class="navBtn next" id="nextBtn">ถัดไป ➡️</button></div>
</div>
<script>
const tenses=[
 {key:'ps',tab:'Present Simple',cls:'blue',accent:'#2f8fff',emoji:'🔁',title:'Present\nSimple',use:'ใช้กับสิ่งที่ทำประจำ / ความจริง / นิสัย',signals:['every day','always','usually','often','sometimes'],formula:['บอกเล่า: S + V1','He/She/It + V-s/es'],rules:['ใช้กับสิ่งที่เกิดซ้ำ ๆ เช่น every day, always','ถ้าประธานเป็น He / She / It กริยาต้องเติม s หรือ es','ในคำถามและปฏิเสธ ใช้ do / does ช่วย'],affirm:'I play football every day.',neg:'I do not play football every day.',ques:'Do you play football every day?',thA:'ฉันเล่นฟุตบอลทุกวัน',thN:'ฉันไม่ได้เล่นฟุตบอลทุกวัน',thQ:'คุณเล่นฟุตบอลทุกวันไหม',extra:'She goes to school by bus. / Does she go to school by bus? / She does not go to school by bus.',warn:'จำให้แม่น: does แล้วกริยากลับเป็น V1 เช่น Does she go? ไม่ใช่ Does she goes?'},
 {key:'pc',tab:'Present Continuous',cls:'purple',accent:'#8c61ff',emoji:'📍',title:'Present\nContinuous',use:'ใช้กับสิ่งที่กำลังทำอยู่ตอนนี้',signals:['now','right now','at the moment','Look!','Listen!'],formula:['บอกเล่า: S + am/is/are + V-ing'],rules:['ใช้กับเหตุการณ์ที่กำลังเกิดขึ้นตอนพูด','ต้องมี verb to be: am / is / are','กริยาหลักเติม -ing'],affirm:'I am playing football now.',neg:'I am not playing football now.',ques:'Are you playing football now?',thA:'ฉันกำลังเล่นฟุตบอลตอนนี้',thN:'ฉันไม่ได้กำลังเล่นฟุตบอลตอนนี้',thQ:'คุณกำลังเล่นฟุตบอลตอนนี้ไหม',extra:'They are studying English. / Are they studying English? / They are not studying English.',warn:'จำให้แม่น: ห้ามลืม am / is / are หน้า V-ing'},
 {key:'past',tab:'Past Simple',cls:'pink',accent:'#ff5aa5',emoji:'⏪',title:'Past\nSimple',use:'ใช้กับเหตุการณ์ที่จบแล้วในอดีต',signals:['yesterday','last night','last week','ago','in 2020'],formula:['บอกเล่า: S + V2','คำถาม/ปฏิเสธ: did + V1'],rules:['ใช้กับเหตุการณ์ที่เกิดและจบแล้ว','บอกเล่าใช้ V2','เมื่อมี did กริยาต้องกลับเป็น V1'],affirm:'I played football yesterday.',neg:'I did not play football yesterday.',ques:'Did you play football yesterday?',thA:'ฉันเล่นฟุตบอลเมื่อวาน',thN:'ฉันไม่ได้เล่นฟุตบอลเมื่อวาน',thQ:'คุณเล่นฟุตบอลเมื่อวานไหม',extra:'She ate breakfast this morning. / Did she eat breakfast? / She did not eat breakfast.',warn:'จำให้แม่น: did แล้วกลับเป็น V1 เช่น Did she eat? ไม่ใช่ Did she ate?'},
 {key:'pp',tab:'Present Perfect',cls:'green',accent:'#22bf86',emoji:'✅',title:'Present\nPerfect',use:'ใช้กับเคยทำ / เพิ่งทำ / ทำแล้วแต่ไม่ระบุเวลาชัด',signals:['ever','never','just','already','yet','since','for'],formula:['บอกเล่า: S + have/has + V3'],rules:['ใช้เมื่อเน้นผลลัพธ์ ไม่เน้นเวลาที่แน่นอน','I/You/We/They ใช้ have','He/She/It ใช้ has','คำถามวาง have/has ไว้หน้าประธาน'],affirm:'I have played football.',neg:'I have not played football.',ques:'Have you played football?',thA:'ฉันได้เล่นฟุตบอลแล้ว / เคยเล่น',thN:'ฉันยังไม่ได้เล่นฟุตบอล / ไม่เคยเล่นตามบริบท',thQ:'คุณเคยเล่นฟุตบอลไหม',extra:'He has finished his homework. / Has he finished his homework? / He has not finished his homework.',warn:'จำให้แม่น: have/has ต้องตามด้วย V3 เสมอ'},
 {key:'future',tab:'Future Simple',cls:'orange',accent:'#ff9b23',emoji:'➡️',title:'Future\nSimple',use:'ใช้กับสิ่งที่จะทำในอนาคต',signals:['tomorrow','next week','next month','soon','tonight'],formula:['บอกเล่า: S + will + V1'],rules:['ใช้พูดถึงอนาคต หรือการตัดสินใจว่าจะทำ','will ใช้ได้กับทุกประธาน','หลัง will ต้องเป็น V1 ไม่เติม s/es/ing'],affirm:'I will play football tomorrow.',neg:'I will not play football tomorrow.',ques:'Will you play football tomorrow?',thA:'ฉันจะเล่นฟุตบอลพรุ่งนี้',thN:'ฉันจะไม่เล่นฟุตบอลพรุ่งนี้',thQ:'คุณจะเล่นฟุตบอลพรุ่งนี้ไหม',extra:'We will visit Grandma next week. / Will we visit Grandma? / We will not visit Grandma.',warn:'จำให้แม่น: will + V1 เท่านั้น เช่น will go ไม่ใช่ will goes'}
];
const slides=[];
slides.push({type:'cover'});
tenses.forEach(t=>{slides.push({type:'intro',t});slides.push({type:'form',t});slides.push({type:'examples',t});slides.push({type:'tip',t});});
slides.push({type:'compare'});
function nl(s){return s.replace('\n','<br>')}
function slideHTML(s,i){
 if(s.type==='cover')return `<section class="slide active"><div class="panel full"><div class="contentPane" style="text-align:center;align-items:center"><div class="kicker" style="background:#111a45;color:#fff">🌟 Kru Pai Classroom</div><h1 class="bigTitle" style="font-size:clamp(44px,8vw,92px);line-height:1;margin:10px 0;background:linear-gradient(90deg,#2f8fff,#8c61ff,#ff5aa5,#ff9b23);-webkit-background-clip:text;color:transparent;font-family:Nunito">5 Tense Focus Slides</h1><p class="lead" style="max-width:850px">อ่านทีละ Tense แบบสไลด์ใหญ่ ๆ ครบทั้ง <b>บอกเล่า</b> / <b>ปฏิเสธ</b> / <b>คำถาม</b> พร้อมตัวอย่างให้เด็กเห็นภาพชัดขึ้น ✨</p><div class="summaryGrid" style="width:100%">${tenses.map(t=>`<div class="sumCard"><span class="ic">${t.emoji}</span><b>${t.tab}</b><small>${t.use}</small></div>`).join('')}</div></div></div></section>`;
 const t=s.t;
 if(s.type==='intro')return `<section class="slide"><div class="panel"><div class="heroPane ${t.cls}"><div><span class="kicker">${t.emoji} Tense Focus</span><h1>${nl(t.title)}</h1><div class="use">${t.use}</div></div><div><div class="signal">${t.signals.map(x=>`<span class="pill">${x}</span>`).join('')}</div></div><div class="emoji">${t.emoji}</div></div><div class="contentPane"><h2 class="bigTitle">จำภาพรวมก่อนนะเด็ก ๆ 💡</h2><p class="lead">หน้านี้อ่านแค่ <b>${t.tab}</b> อย่างเดียว เพื่อไม่ให้สับสนกับ tense อื่น</p><div class="ruleList">${t.rules.map((r,k)=>`<div class="rule"><span>${['✅','⭐','🎯','🧠'][k%4]}</span><div>${r}</div></div>`).join('')}</div></div></div></section>`;
 if(s.type==='form')return `<section class="slide"><div class="panel"><div class="heroPane ${t.cls}"><div><span class="kicker">📌 โครงสร้าง</span><h1>${nl(t.title)}</h1><div class="use">สูตรประโยคที่ต้องจำ</div></div><div class="signal">${t.signals.slice(0,4).map(x=>`<span class="pill">${x}</span>`).join('')}</div><div class="emoji">📚</div></div><div class="contentPane"><div class="formulaCard"><h2>โครงสร้างหลัก</h2>${t.formula.map(f=>`<div class="formula">${f}</div>`).join('')}<div class="note">อ่านสูตรนี้ก่อน แล้วค่อยดูตัวอย่างในหน้าถัดไป</div></div><div class="formulaCard"><h2>ตัวอย่างเพิ่มเติม</h2><div class="lead" style="margin:0">${t.extra}</div></div></div></div></section>`;
 if(s.type==='examples')return `<section class="slide"><div class="panel full"><div class="contentPane"><h2 class="bigTitle" style="text-align:center;color:${t.accent}">${t.emoji} ${t.tab}</h2><p class="lead" style="text-align:center;margin-top:0">ตัวอย่างครบ 3 แบบ อ่านแล้วเทียบกันได้ทันที</p><div class="exampleGrid"><div class="exampleCard" style="--accent:${t.accent}"><span class="label">✅ บอกเล่า</span><div class="en">${t.affirm}</div><div class="th">${t.thA}</div></div><div class="exampleCard" style="--accent:#ff5a6e"><span class="label">❌ ปฏิเสธ</span><div class="en">${t.neg}</div><div class="th">${t.thN}</div></div><div class="exampleCard" style="--accent:#ffbc2e"><span class="label">❓ คำถาม</span><div class="en">${t.ques}</div><div class="th">${t.thQ}</div></div></div><div class="formulaCard" style="border-left:12px solid ${t.accent}"><h2>ครูไพจำให้หน่อย ✨</h2><div class="lead">${t.warn}</div></div></div></div></section>`;
 if(s.type==='tip')return `<section class="slide"><div class="panel"><div class="heroPane ${t.cls}"><div><span class="kicker">🧠 สรุปจำเร็ว</span><h1>${nl(t.title)}</h1><div class="use">ก่อนข้ามไป tense ถัดไป</div></div><div class="emoji">🏆</div></div><div class="contentPane"><h2 class="bigTitle">เด็กควรจำอะไรจากหน้านี้?</h2><div class="ruleList"><div class="rule"><span>1️⃣</span><div><b>ใช้เมื่อ:</b> ${t.use}</div></div><div class="rule"><span>2️⃣</span><div><b>คำบอกเวลา:</b> ${t.signals.join(' • ')}</div></div><div class="rule"><span>3️⃣</span><div><b>ตัวอย่างบอกเล่า:</b> ${t.affirm}</div></div><div class="rule"><span>4️⃣</span><div><b>ตัวอย่างปฏิเสธ:</b> ${t.neg}</div></div><div class="rule"><span>5️⃣</span><div><b>ตัวอย่างคำถาม:</b> ${t.ques}</div></div></div></div></div></section>`;
 if(s.type==='compare')return `<section class="slide"><div class="panel full"><div class="contentPane"><h2 class="bigTitle" style="text-align:center">👀 เหตุการณ์เดียวกัน เวลาเปลี่ยน Tense เปลี่ยน</h2><p class="lead" style="text-align:center;margin-top:0">ดูคำว่า “เล่นฟุตบอล” เหมือนกัน แต่รูปประโยคเปลี่ยนตามเวลา</p><div class="compareGrid">${tenses.map(t=>`<div class="compareCard" style="--accent:${t.accent}"><b>${t.emoji} ${t.tab}</b><div class="en">${t.affirm}</div><div class="th">${t.use}</div></div>`).join('')}</div><div class="formulaCard"><h2>🏆 สูตรจำเร็ว 5 Tense</h2><div class="summaryGrid">${tenses.map(t=>`<div class="sumCard"><span class="ic">${t.emoji}</span><b>${t.tab}</b><small>${t.formula[0]}</small></div>`).join('')}</div></div></div></div></section>`;
}
const slideArea=document.getElementById('slideArea');slideArea.innerHTML=slides.map(slideHTML).join('');
const tabs=document.getElementById('tabs');tabs.innerHTML='<button class="tab" data-go="0">🏠 หน้าแรก</button>'+tenses.map((t,idx)=>`<button class="tab" data-go="${1+idx*4}">${t.emoji} ${t.tab}</button>`).join('')+`<button class="tab" data-go="${slides.length-1}">👀 เปรียบเทียบ</button>`;
const slideEls=[...document.querySelectorAll('.slide')],tabEls=[...document.querySelectorAll('.tab')],prev=document.getElementById('prevBtn'),next=document.getElementById('nextBtn'),progress=document.getElementById('progress'),pageCount=document.getElementById('pageCount');let current=0;
function show(n){current=Math.max(0,Math.min(slideEls.length-1,n));slideEls.forEach((el,i)=>el.classList.toggle('active',i===current));prev.disabled=current===0;next.disabled=current===slideEls.length-1;next.textContent=current===slideEls.length-1?'จบแล้ว 🏆':'ถัดไป ➡️';pageCount.textContent=(current+1)+' / '+slideEls.length;progress.style.width=((current+1)/slideEls.length*100)+'%';tabEls.forEach(btn=>{const go=+btn.dataset.go;let active=false;if(go===0)active=current===0;else if(go===slides.length-1)active=current===slides.length-1;else active=current>=go && current<go+4;btn.classList.toggle('active',active)});window.scrollTo({top:0,behavior:'smooth'});}
prev.onclick=()=>show(current-1);next.onclick=()=>show(current+1);tabEls.forEach(b=>b.onclick=()=>show(+b.dataset.go));
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')show(current+1);if(e.key==='ArrowLeft')show(current-1)});show(0);
</script>
